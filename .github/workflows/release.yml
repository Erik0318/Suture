name: Release AppImage

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install native and bundled dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libudev-dev libgtk-3-dev libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev \
            pkg-config ffmpeg cdparanoia curl file
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Test
        run: cargo test --locked --all-features
      - name: Build
        run: cargo build --locked --release
      - name: Fetch linuxdeploy
        run: |
          curl -fL -o linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage scripts/package-appimage.sh
      - name: Package AppImage
        run: scripts/package-appimage.sh "${GITHUB_REF_NAME#v}"
      - name: Validate bundled tools
        run: |
          APPIMAGE_EXTRACT_AND_RUN=1 ./Suture-*.AppImage --appimage-extract
          env -i HOME="$HOME" PATH=/usr/bin:/bin squashfs-root/usr/bin/ffmpeg -version
          env -i HOME="$HOME" PATH=/usr/bin:/bin squashfs-root/usr/bin/ffprobe -version
          env -i HOME="$HOME" PATH=/usr/bin:/bin squashfs-root/usr/bin/cdparanoia --version
          ! ldd squashfs-root/usr/bin/ffprobe | grep -q 'not found'
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Suture-*.AppImage
            Suture-*.AppImage.sha256
            LICENSE
            THIRD_PARTY_NOTICES.md
            CHANGELOG.md
