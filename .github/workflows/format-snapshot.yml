name: Format Snapshot

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
          components: rustfmt
      - name: Format and verify
        run: |
          cargo fmt --all
          cargo fmt --all -- --check
          tar -czf formatted-source.tgz src
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rustfmt-source
          path: formatted-source.tgz
