name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libudev-dev libgtk-3-dev libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev \
            pkg-config ffmpeg cdparanoia libdiscid-dev curl ca-certificates
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: Tests
        run: cargo test --locked --all-features

  appimage:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install build and smoke-test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libudev-dev libgtk-3-dev libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev \
            pkg-config ffmpeg cdparanoia libdiscid-dev curl ca-certificates file xvfb xauth
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Build release binary
        run: cargo build --locked --release
      - name: Fetch linuxdeploy
        run: |
          curl -fL -o linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage scripts/package-appimage.sh
      - name: Package
        run: scripts/package-appimage.sh "1.0.0"
      - name: Inspect bundled tools
        run: |
          APPIMAGE_EXTRACT_AND_RUN=1 ./Suture1.0.0.AppImage --appimage-extract
          test -x squashfs-root/usr/bin/suture
          test -x squashfs-root/usr/bin/ffmpeg
          test -x squashfs-root/usr/bin/ffprobe
          test -x squashfs-root/usr/bin/cdparanoia
          test -x squashfs-root/usr/bin/curl
          test -f squashfs-root/usr/share/suture/ca-certificates.crt
          env -i HOME="$HOME" PATH=/usr/bin:/bin squashfs-root/usr/bin/ffmpeg -version
          env -i HOME="$HOME" PATH=/usr/bin:/bin squashfs-root/usr/bin/ffprobe -version
          env -i HOME="$HOME" PATH=/usr/bin:/bin squashfs-root/usr/bin/cdparanoia --version
          env -i HOME="$HOME" PATH=/usr/bin:/bin squashfs-root/usr/bin/curl --version
          if ldd squashfs-root/usr/bin/ffprobe | grep -q 'not found'; then
            ldd squashfs-root/usr/bin/ffprobe
            exit 1
          fi
          if ldd squashfs-root/usr/bin/suture | grep -q 'not found'; then
            ldd squashfs-root/usr/bin/suture
            exit 1
          fi
      - name: Headless launch smoke test
        run: |
          set +e
          APPIMAGE_EXTRACT_AND_RUN=1 timeout 8s xvfb-run -a ./Suture1.0.0.AppImage
          status=$?
          set -e
          if [[ "$status" -ne 0 && "$status" -ne 124 ]]; then
            exit "$status"
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: Suture1.0.0-AppImage
          path: |
            Suture1.0.0.AppImage
            Suture1.0.0.AppImage.sha256

  windows:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: test
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-binutils
            mingw-w64-ucrt-x86_64-ca-certificates
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-libcdio-paranoia
      - name: Tests
        run: cargo test --locked --all-features
      - name: Build release binary
        run: cargo build --locked --release
      - name: Locate bundled Windows tools
        shell: msys2 {0}
        run: echo "SUTURE_UCRT_BIN=$(cygpath -w /ucrt64/bin)" >> "$GITHUB_ENV"
      - name: Download certificate authorities
        shell: pwsh
        run: |
          Invoke-WebRequest https://curl.se/ca/cacert.pem -OutFile ca-certificates.crt
      - name: Ensure installer compiler
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe")) {
            choco install innosetup --no-progress -y
          }
      - name: Package installer
        shell: pwsh
        run: scripts/package-windows.ps1 1.0.0
      - name: Inspect bundled tools
        shell: pwsh
        run: |
          $app = "dist-windows/app"
          & "$app/ffmpeg.exe" -version
          & "$app/ffprobe.exe" -version
          & "$app/curl.exe" --version
          & "$app/cd-paranoia.exe" --version
          if (-not (Test-Path "$app/ca-certificates.crt")) { throw "CA bundle missing" }
      - name: Launch smoke test
        shell: pwsh
        run: |
          $process = Start-Process -FilePath "dist-windows/app/Suture.exe" -PassThru
          Start-Sleep -Seconds 8
          if ($process.HasExited) { throw "Suture exited during the Windows smoke test with $($process.ExitCode)" }
          Stop-Process -Id $process.Id -Force
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: Suture1.0.0-Windows
          path: |
            dist-windows/Suture1.0.0-Windows-x86_64-Setup.exe
            dist-windows/Suture1.0.0-Windows-x86_64-Setup.exe.sha256

  macos:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: windows
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Install media and packaging tools
        run: brew install ffmpeg curl libcdio-paranoia dylibbundler ca-certificates
      - name: Tests
        run: cargo test --locked --all-features
      - name: Build release binary
        run: cargo build --locked --release
      - name: Package application
        run: scripts/package-macos.sh 1.0.0
      - name: Inspect bundled tools
        run: |
          app="dist-macos/Suture.app/Contents/MacOS"
          "$app/ffmpeg" -version
          "$app/ffprobe" -version
          "$app/curl" --version
          "$app/cd-paranoia" --version
          codesign --verify --deep --strict "dist-macos/Suture.app"
      - name: Launch smoke test
        run: |
          "dist-macos/Suture.app/Contents/MacOS/Suture" &
          pid=$!
          sleep 8
          if ! kill -0 "$pid" 2>/dev/null; then
            wait "$pid"
            exit $?
          fi
          kill "$pid"
          wait "$pid" || true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: Suture1.0.0-macOS
          path: |
            Suture1.0.0-macOS-*.dmg
            Suture1.0.0-macOS-*.dmg.sha256

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [appimage, windows, macos]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: Suture1.0.0-*
          path: release-assets
          merge-multiple: true
      - name: Inspect release files
        run: |
          find release-assets -maxdepth 1 -type f -printf '%f\n' | sort
          test -f release-assets/Suture1.0.0.AppImage
          test -f release-assets/Suture1.0.0-Windows-x86_64-Setup.exe
          test "$(find release-assets -maxdepth 1 -name 'Suture1.0.0-macOS-*.dmg' | wc -l)" -eq 1
      - name: Publish Suture 1.0.0
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: v1.0.0
          name: Suture 1.0.0
          prerelease: false
          make_latest: true
          generate_release_notes: true
          body: |
            Suture 1.0.0 for Linux, Windows, and macOS. Each download is self-contained and includes FFmpeg, ffprobe, curl, and the cross-platform libcdio-paranoia CD reader.

            Audio/video export, file and folder import, optical-drive discovery, separate CD track export, MusicBrainz TOC matching, Unicode timestamps, bundled-tool startup, and native launch checks are preserved across platforms.

            The Windows installer and macOS application are currently unsigned, so the operating system may ask the user to approve the first launch.
          files: |
            release-assets/*
            LICENSE
            THIRD_PARTY_NOTICES.md
            CHANGELOG.md
      - name: Verify the sole release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets="$(gh release view v1.0.0 --json assets --jq '.assets[].name')"
          grep -Fx 'Suture1.0.0.AppImage' <<<"$assets"
          grep -Fx 'Suture1.0.0-Windows-x86_64-Setup.exe' <<<"$assets"
          grep -Ex 'Suture1\.0\.0-macOS-(arm64|x86_64)\.dmg' <<<"$assets"
          for tag in v0.1.0-alpha.1 v0.1.0-alpha.2; do
            if gh release view "$tag" >/dev/null 2>&1; then
              gh release delete "$tag" --yes
            fi
          done
          remaining="$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            --jq 'map(select(.tag_name != "v1.0.0")) | length')"
          test "$remaining" -eq 0
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=success \
            -f context='suture/release-invariant' \
            -f description='Only v1.0.0 with Linux, Windows, and macOS apps remains' \
            >/dev/null
